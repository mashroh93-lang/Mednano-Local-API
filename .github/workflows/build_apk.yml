name: Build Mednano APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 جلب الكود
        uses: actions/checkout@v4

      - name: ☕ إعداد بيئة Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 إعداد Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 🏗️ بناء Mednano AI بنظام نظيف
        run: |
          flutter create --platforms=android mednano_ai
          rm -rf mednano_ai/lib
          cp -r mednano_vision_app/lib mednano_ai/lib
          cp -r mednano_vision_app/assets mednano_ai/assets
          cp mednano_vision_app/pubspec.yaml mednano_ai/pubspec.yaml
          
          # 1. إضافة صلاحية الإنترنت
          sed -i 's/<application/<uses-permission android:name="android.permission.INTERNET"\/>\n    <application/g' mednano_ai/android/app/src/main/AndroidManifest.xml
          
          # 2. زرع مكتبة PyTorch بالقوة في آخر الملف (الطريقة المضمونة)
          if [ -f mednano_ai/android/app/build.gradle.kts ]; then
            echo 'dependencies { implementation("org.pytorch:pytorch_android_lite:1.13.0") }' >> mednano_ai/android/app/build.gradle.kts
          else
            echo 'dependencies { implementation "org.pytorch:pytorch_android_lite:1.13.0" }' >> mednano_ai/android/app/build.gradle
          fi
          
          # 3. نقل كود الكوبري (MainActivity.kt) لمكانه السري
          mkdir -p mednano_ai/android/app/src/main/kotlin/com/example/mednano_ai/
          cp mednano_vision_app/MainActivity.kt mednano_ai/android/app/src/main/kotlin/com/example/mednano_ai/MainActivity.kt
          
          # 4. بناء الـ APK النهائي
          cd mednano_ai
          flutter pub upgrade
          flutter build apk --release

      - name: 📦 رفع الـ APK للتحميل
        uses: actions/upload-artifact@v4
        with:
          name: Mednano-AI-App
          path: mednano_ai/build/app/outputs/flutter-apk/app-release.apk
