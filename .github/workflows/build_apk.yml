name: Build Mednano APK

on:
  workflow_dispatch: # الزرار السحري للتشغيل اليدوي

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 جلب الكود
        uses: actions/checkout@v4

      - name: ☕ إعداد بيئة Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 إعداد Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: ⚙️ تحميل المكتبات وبناء الـ APK
        run: |
          cd mednano_vision_app
          flutter pub get
          flutter build apk --release

      - name: 📦 رفع الـ APK للتحميل
        uses: actions/upload-artifact@v4
        with:
          name: Mednano-App
          path: mednano_vision_app/build/app/outputs/flutter-apk/app-release.apk