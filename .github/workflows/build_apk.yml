name: Build Mednano APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 جلب الكود
        uses: actions/checkout@v4

      - name: ☕ إعداد بيئة Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 إعداد Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 🏗️ البناء بنظام المشروع النظيف
        run: |
          # 1. إنشاء مشروع أندرويد بكر تماماً
          flutter create --platforms=android clean_app
          
          # 2. نقل ملفاتك الذكية للمشروع الجديد (العفش في الشقة الجديدة)
          rm -rf clean_app/lib
          cp -r mednano_vision_app/lib clean_app/lib
          cp -r mednano_vision_app/assets clean_app/assets
          cp mednano_vision_app/pubspec.yaml clean_app/pubspec.yaml
          
          # 3. التحميل والبناء
          cd clean_app
          flutter pub get
          flutter build apk --release

      - name: 📦 رفع الـ APK للتحميل
        uses: actions/upload-artifact@v4
        with:
          name: Mednano-App
          path: clean_app/build/app/outputs/flutter-apk/app-release.apk
