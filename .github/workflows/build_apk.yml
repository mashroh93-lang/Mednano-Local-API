name: Build Mednano APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 جلب الكود
        uses: actions/checkout@v4

      - name: ☕ إعداد بيئة Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 إعداد Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 🏗️ بناء Mednano AI بنظام نظيف
        run: |
          # 1. إنشاء المشروع بالاسم الجديد
          flutter create --platforms=android mednano_ai
          
          # 2. نقل ملفاتك للمشروع الجديد
          rm -rf mednano_ai/lib
          cp -r mednano_vision_app/lib mednano_ai/lib
          cp -r mednano_vision_app/assets mednano_ai/assets
          cp mednano_vision_app/pubspec.yaml mednano_ai/pubspec.yaml

          sed -i 's/<application/<uses-permission android:name="android.permission.INTERNET"\/>\n    <application/g' mednano_ai/android/app/src/main/AndroidManifest.xml
          
          # 3. بناء الـ APK
          cd mednano_ai
          flutter pub upgrade
          flutter build apk --release

      - name: 📦 رفع الـ APK للتحميل
        uses: actions/upload-artifact@v4
        with:
          name: Mednano-AI-App
          path: mednano_ai/build/app/outputs/flutter-apk/app-release.apk
